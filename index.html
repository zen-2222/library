<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>

<body>
<!--
display books in table, with button to remove and a isread button    
add book button
-->
    <div class="container">
        <h1 class="header">Personal library</h1>
        <main class="main">
            <table id="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Author</th>
                        <th>Pages</th>
                        <th>Read?</th>
                    </tr>
                </thead>
                <tbody id="content">
                    
                </tbody>

            </table>

            <button type="button" id="btn">Add new book</button>

        </main>



        <footer class="footer">
            <p class="footer__text">&copy; M <time datetime="2026">2026</time></p>
        </footer>
        
    </div>
