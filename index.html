<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="nah">
</head>
<body>
<!--
display books in table, with button to remove and a isread button    
add book button
-->
    <div class="container">
        <h1 class="header">Personal library</h1>
        <main class="main">
            <table id="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Author</th>
                        <th>Pages</th>
                        <th>Read?</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody id="content">
                    
                </tbody>

            </table>

            <button type="button" id="btn">Add new book</button>
            <dialog id="book__details">
                <button id="close">x</button>
                <form action="" id="book__form">
                    <label for="name">
                        Name <br>
                        <input type="text" name="name" id="name">

                    </label>
                    <label for="author">
                        Author <br>
                        <input type="text" name="author" id="author">

                    </label>
                    <label for="pages">
                        Pages <br>
                        <input type="number" name="pages" id="pages">

                    </label>
                    <label for="read">
                        Read?<br>
                        <input type="checkbox" name="read" id="read">
                    </label>


                    <button type="button" id="form-add">add book</button>
                </form>
            </dialog>
        </main>



        <footer class="footer">
            <p class="footer__text">&copy; M <time datetime="2026">2026</time></p>
        </footer>
        
    </div>
</body>
</html>
